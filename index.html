    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg-page: #f5f7fa; --bg-surface: #ffffff; --bg-card: #ffffff; --bg-elevated: #f0f2f5;
            --text-primary: #1a1a2e; --text-secondary: #4a4a5a; --text-muted: #8e8ea0;
            --border: #e8ecf0; --success: #2ecc71; --success-dark: #27ae60;
            --danger: #e74c3c; --danger-dark: #c0392b; --info: #3498db;
            --warning: #f39c12; --shadow: 0 4px 16px rgba(0,0,0,0.06);
            --radius-card: 16px; --radius-btn: 12px; --hover-bg: #eef1f5;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --scan-primary: #6c5ce7;
            --scan-primary-dark: #5a4bd1;
            --scan-secondary: #00b894;
            --scan-danger: #fd79a8;
        }
        body.dark-theme {
            --bg-page: #0d1117; --bg-surface: #161b22; --bg-card: #1c2333;
            --bg-elevated: #252d3f; --text-primary: #f0f6fc; --text-secondary: #c9d1d9;
            --text-muted: #8b949e; --border: #30363d; --shadow: 0 4px 16px rgba(0,0,0,0.4);
            --hover-bg: #2d3548;
            --scan-primary: #a29bfe;
            --scan-primary-dark: #6c5ce7;
            --scan-secondary: #55efc4;
            --scan-danger: #fd79a8;
        }
        body { background-color: var(--bg-page); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif; color: var(--text-primary); padding: 0; margin: 0; min-height: 100vh; transition: var(--transition); }
        
        /* ===== AUTH ===== */
        .auth-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-page); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .auth-card { background: var(--bg-card); border-radius: 24px; padding: 32px 24px; width: 100%; max-width: 340px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .auth-card h2 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
        .auth-card .sub { color: var(--text-secondary); margin-bottom: 24px; font-size: 14px; }
        .auth-input { width: 100%; padding: 14px 16px; margin-bottom: 12px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 12px; color: var(--text-primary); font-size: 15px; transition: var(--transition); }
        .auth-input:focus { outline: none; border-color: var(--success); box-shadow: 0 0 0 3px rgba(46,204,113,0.15); }
        .auth-btn { width: 100%; background: var(--success); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 600; font-size: 15px; cursor: pointer; transition: var(--transition); }
        .auth-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(46,204,113,0.3); }
        .auth-link { text-align: center; margin-top: 16px; color: var(--text-secondary); font-size: 13px; }
        .auth-link a { color: var(--success); font-weight: 600; text-decoration: none; cursor: pointer; }

        /* ===== APP ===== */
        .app-container { display: none; padding: 16px 16px 80px 16px; max-width: 600px; margin: 0 auto; }
        .mobile-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
        .logo-area h1 { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, #2ecc71, #3498db); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: -0.5px; }
        .user-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .user-badge { background: var(--bg-elevated); padding: 6px 14px; border-radius: 30px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px; color: var(--text-secondary); }
